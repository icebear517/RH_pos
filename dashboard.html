<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡里善之樹 - 營運後台</title>
    <style>
        body { font-family: '微軟正黑體', sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; }
        h1 { color: #2c3e50; text-align: center; }
        
        /* 區塊樣式 */
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { color: #34495e; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; font-size: 20px; }
        
        /* 篩選器 */
        .filter-bar { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        input[type="date"] { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; }
        button { padding: 10px 20px; font-size: 16px; background-color: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #2980b9; }
        
        /* 數據重點 */
        .kpi-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .kpi-box { flex: 1; background: #e8f8f5; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #d1f2eb; }
        .kpi-box h3 { margin: 0 0 10px 0; color: #16a085; font-size: 18px; }
        .kpi-box .num { font-size: 32px; font-weight: bold; color: #27ae60; }
        .kpi-box.negative { background: #fadbd8; border-color: #f5b7b1; }
        .kpi-box.negative h3 { color: #c0392b; }
        .kpi-box.negative .num { color: #e74c3c; }

        /* 表格與列表 */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f9f9f9; color: #666; }
        .alert-item { color: #e74c3c; font-weight: bold; background: #fff3f3; padding: 10px; border-radius: 6px; margin-bottom: 5px; display: inline-block; margin-right: 10px;}

        /* Gemini 提示詞生成區 */
        .prompt-area { width: 100%; height: 150px; padding: 15px; font-size: 16px; border: 2px dashed #9b59b6; border-radius: 8px; background: #fdfaf6; resize: vertical; line-height: 1.5; box-sizing: border-box; }
        .btn-gemini { background-color: #9b59b6; width: 100%; margin-top: 10px; font-weight: bold; font-size: 18px; padding: 15px; }
        .btn-gemini:hover { background-color: #8e44ad; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 卡里善之樹 營運後台</h1>
    
    <div class="card filter-bar">
        <label>開始日期：<input type="date" id="startDate"></label>
        <label>結束日期：<input type="date" id="endDate"></label>
        <button onclick="generateReport()">產出報表</button>
        <span id="statusText" style="color: #7f8c8d; margin-left: 10px;">資料載入中...</span>
    </div>

    <div class="kpi-row">
        <div class="kpi-box"><h3>💰 區間總營收</h3><div class="num" id="kpiRevenue">$0</div></div>
        <div class="kpi-box"><h3>🛍️ 售出總件數</h3><div class="num" id="kpiSalesQty">0 件</div></div>
        <div class="kpi-box negative"><h3>🔄 退貨總件數</h3><div class="num" id="kpiReturnQty">0 件</div></div>
    </div>

    <div class="card">
        <h2>🔥 區間銷售排行 (由大到小)</h2>
        <table>
            <thead><tr><th>排行</th><th>品名</th><th>售出數量</th><th>貢獻營收</th></tr></thead>
            <tbody id="topSalesBody"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>🔙 區間退貨明細</h2>
        <table>
            <thead><tr><th>時間</th><th>原訂單號</th><th>品名</th><th>退貨數量</th><th>退款金額</th></tr></thead>
            <tbody id="returnsBody"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>⚠️ 低庫存警示 (庫存少於或等於 2 件)</h2>
        <div id="lowStockAlerts"></div>
    </div>

    <div class="card">
        <h2>✨ 每日營運 Gemini 提示詞產生器</h2>
        <p style="color: #666; font-size: 14px; margin-top: 0;">點擊複製後，直接貼上給 Gemini，讓 AI 幫您分析營運狀況並提供進貨或促銷建議。</p>
        <textarea id="geminiPrompt" class="prompt-area" readonly></textarea>
        <button class="btn-gemini" onclick="copyPrompt()">📋 複製提示詞</button>
    </div>
</div>

<script>
    // ⚠️ 請換成您最新的 API 網址
    const API_URL = "https://script.google.com/macros/s/AKfycbzV6mZl2CSUrLBlPV1CwFwNi_z6l7A15B_a54tFFA2sEPIo8IPhmX9o1pbBBHFQsEoK/exec";
    
    let allTransactions = [];
    let productsDB = [];

    // 預設填入今日日期
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('startDate').value = today;
    document.getElementById('endDate').value = today;

    window.onload = async () => {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            if(data.status === 'success') {
                allTransactions = data.allTransactions || [];
                productsDB = data.products || [];
                document.getElementById('statusText').innerText = "✅ 資料載入完成";
                generateReport(); // 自動產生今日報表
            }
        } catch (err) {
            document.getElementById('statusText').innerText = "❌ 資料載入失敗";
        }
    };

    function generateReport() {
        const start = new Date(document.getElementById('startDate').value);
        start.setHours(0,0,0,0);
        const end = new Date(document.getElementById('endDate').value);
        end.setHours(23,59,59,999);

        // 1. 過濾區間內的交易
        const periodTrans = allTransactions.filter(tx => {
            const txDate = new Date(tx.time);
            return txDate >= start && txDate <= end;
        });

        let totalRevenue = 0;
        let totalSalesQty = 0;
        let totalReturnQty = 0;
        let itemStats = {};
        let returnsHtml = '';

        // 2. 統計數據
        periodTrans.forEach(tx => {
            const p = productsDB.find(p => p.barcode === tx.barcode);
            const pName = p ? p.name : '未知商品';

            if(tx.type === '售出') {
                totalRevenue += tx.finalPrice;
                totalSalesQty += tx.qty;
                
                if(!itemStats[tx.barcode]) itemStats[tx.barcode] = { name: pName, qty: 0, revenue: 0 };
                itemStats[tx.barcode].qty += tx.qty;
                itemStats[tx.barcode].revenue += tx.finalPrice;
            } 
            else if (tx.type === '退貨') {
                totalRevenue += tx.finalPrice; // 退貨金額為負數，所以用加的
                totalReturnQty += Math.abs(tx.qty);
                
                const txTime = new Date(tx.time).toLocaleString('zh-TW');
                returnsHtml += `<tr><td>${txTime}</td><td>${tx.refOrderId}</td><td>${pName}</td><td>${Math.abs(tx.qty)}</td><td style="color:#c0392b;">$${tx.finalPrice}</td></tr>`;
            }
        });

        document.getElementById('kpiRevenue').innerText = `$${totalRevenue}`;
        document.getElementById('kpiSalesQty').innerText = `${totalSalesQty} 件`;
        document.getElementById('kpiReturnQty').innerText = `${totalReturnQty} 件`;

        // 3. 銷售排行排序
        const sortedItems = Object.values(itemStats).sort((a, b) => b.qty - a.qty);
        let salesHtml = '';
        sortedItems.forEach((item, index) => {
            salesHtml += `<tr><td>#${index + 1}</td><td>${item.name}</td><td>${item.qty}</td><td>$${item.revenue}</td></tr>`;
        });
        document.getElementById('topSalesBody').innerHTML = salesHtml || '<tr><td colspan="4" style="text-align:center;">區間內無銷售紀錄</td></tr>';
        document.getElementById('returnsBody').innerHTML = returnsHtml || '<tr><td colspan="5" style="text-align:center;">區間內無退貨紀錄</td></tr>';

        // 4. 低庫存警示 (庫存 <= 2)
        let lowStockHtml = '';
        let lowStockNames = [];
        productsDB.forEach(p => {
            if(Number(p.stock) <= 2) {
                lowStockHtml += `<div class="alert-item">⚠️ ${p.name} (剩餘: ${p.stock}件)</div>`;
                lowStockNames.push(`${p.name}(剩${p.stock}件)`);
            }
        });
        document.getElementById('lowStockAlerts').innerHTML = lowStockHtml || '<span style="color:#27ae60;">目前所有商品庫存充足。</span>';

        // 5. 產生 Gemini 提示詞
        generateGeminiPrompt(totalRevenue, totalSalesQty, totalReturnQty, sortedItems, lowStockNames);
    }

    function generateGeminiPrompt(revenue, salesQty, returnQty, sortedItems, lowStockNames) {
        const top3 = sortedItems.slice(0, 3).map((item, idx) => `${idx+1}. ${item.name} (售出 ${item.qty} 件)`).join('，');
        const lowStockStr = lowStockNames.length > 0 ? lowStockNames.join('、') : '目前庫存皆處於安全水位';
        const dateRange = document.getElementById('startDate').value === document.getElementById('endDate').value 
            ? document.getElementById('startDate').value 
            : `${document.getElementById('startDate').value} 至 ${document.getElementById('endDate').value}`;

        const promptText = `我是卡里善之樹的館長。以下是 ${dateRange} 的專櫃營運數據，請以專業零售顧問的角度幫我分析並給予具體建議：\n\n【營運數據】\n- 總營業額：${revenue} 元\n- 總售出件數：${salesQty} 件\n- 退貨件數：${returnQty} 件\n- 熱銷前三名：${top3 || '無資料'}\n- 低庫存警示 (<=2件)：${lowStockStr}\n\n【請回覆以下重點】\n1. 針對目前的營收與熱銷品項，分析消費者的購買偏好。\n2. 針對低庫存商品與客群特性，我明天的備貨策略或現場陳列應該如何調整？\n3. 如果我想在接下來的週末推動「滿額或搭售」的促銷活動，根據上述熱銷品，你有什麼具體的行銷提案？`;

        document.getElementById('geminiPrompt').value = promptText;
    }

    function copyPrompt() {
        const copyText = document.getElementById('geminiPrompt');
        copyText.select();
        copyText.setSelectionRange(0, 99999); 
        navigator.clipboard.writeText(copyText.value).then(() => {
            alert("✅ 提示詞已複製！您可以直接貼上給 Gemini 囉！");
        });
    }
</script>

</body>
</html>
